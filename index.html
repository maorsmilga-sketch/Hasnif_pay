<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הסניף הדיגיטלי</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 2rem 1.25rem;
      gap: 2.5rem;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .logo {
      display: block;
      margin: 1rem auto 0;
      width: clamp(120px, 35vw, 180px);
      height: auto;
    }

    header p {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: #9ca3af;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 360px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-radius: 14px;
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
      color: #ffffff;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }

    .btn:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    .btn-paybox {
      background: rgba(79, 70, 229, 0.22);
      border: 1px solid rgba(167, 139, 250, 0.35);
    }

    .btn-bit {
      background: rgba(5, 150, 105, 0.2);
      border: 1px solid rgba(52, 211, 153, 0.35);
    }

    .btn-cashcash {
      background: linear-gradient(135deg, #dc2626, #f97316);
    }

    .btn svg {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
    }

    .btn img.btn-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      object-fit: contain;
      border-radius: 8px;
    }

    footer {
      font-size: 0.8rem;
      color: #4b5563;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      z-index: 100;
      animation: modal-fade 0.18s ease;
    }

    .modal.is-open {
      display: flex;
    }

    @keyframes modal-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-card {
      position: relative;
      background: #1a1d27;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 2rem 1.5rem 1.5rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      animation: modal-pop 0.22s ease;
    }

    @keyframes modal-pop {
      from { transform: translateY(12px) scale(0.97); opacity: 0; }
      to   { transform: translateY(0)    scale(1);    opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: #9ca3af;
      font-size: 1.6rem;
      line-height: 1;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.12s ease, color 0.12s ease;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .modal-title {
      color: #ffffff;
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }

    .modal-text {
      color: #9ca3af;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .modal-number {
      font-size: 1.8rem;
      font-weight: 800;
      color: #34d399;
      letter-spacing: 0.04em;
      background: rgba(5, 150, 105, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      margin-bottom: 1.25rem;
      user-select: all;
      -webkit-user-select: all;
    }

    .modal-btn {
      width: 100%;
      padding: 0.9rem 1.25rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #059669, #10b981);
      color: #ffffff;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.12s ease, transform 0.12s ease;
    }

    .modal-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .modal-btn:active {
      transform: translateY(0);
    }

    .modal-btn.copied {
      background: linear-gradient(135deg, #16a34a, #4ade80);
    }
  </style>
</head>
<body>

  <header>
    <h1>הסניף הדיגיטלי</h1>
    <img src="logo1.png" alt="לוגו הסניף הדיגיטלי" class="logo" width="180" decoding="async" />
    <p>בחר אמצעי תשלום</p>
  </header>

  <div class="buttons">
    <a id="btn-paybox" href="#" class="btn btn-paybox" target="_blank" rel="noopener">
      <img src="PayBox.png" alt="PayBox" class="btn-icon" width="38" height="38" decoding="async" />
      PayBox
    </a>

    <a id="btn-bit" href="#" class="btn btn-bit" target="_blank" rel="noopener">
      <img src="Bit.png" alt="ביט" class="btn-icon" width="38" height="38" decoding="async" />
      Bit
    </a>

    <a id="btn-cashcash" href="#" class="btn btn-cashcash" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8"/>
        <path d="M12 8v8M9 10h4.5a1.5 1.5 0 0 1 0 3H9"/>
      </svg>
      CashCash
    </a>
  </div>

  <footer>הסניף הדיגיטלי &copy; 2026</footer>

  <div id="bit-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="bit-modal-title" aria-hidden="true">
    <div class="modal-card" role="document">
      <button id="bit-close-btn" class="modal-close" type="button" aria-label="סגור">&times;</button>
      <h2 id="bit-modal-title" class="modal-title">תשלום ב-Bit</h2>
      <p class="modal-text">פתחו את אפליקציית Bit ושלחו למספר:</p>
      <div id="bit-modal-number" class="modal-number" dir="ltr">000-000-0000</div>
      <button id="bit-copy-btn" class="modal-btn" type="button">העתק מספר</button>
    </div>
  </div>

  <script>
    // ===== הגדרות - שנה כאן בלבד =====
    const CONFIG = {
      payboxGroupUrl: "https://links.payboxapp.com/VGgSI54AzVb",  // קישור קבוצת PayBox
      bitRequestUrl:  "",                                         // אופציונלי: לינק "בקש כסף" מאפליקציית Bit
      bitPhoneNumber: "0546819166",                               // מספר טלפון לביט (יוצג להעתקה כשאין bitRequestUrl)
      cashcashUrl:    "https://www.cashcash.co.il/0559877777",    // קישור CashCash
    };
    // ===================================

    document.getElementById("btn-paybox").href = CONFIG.payboxGroupUrl;
    document.getElementById("btn-cashcash").href = CONFIG.cashcashUrl;

    // ----- כפתור Bit -----
    const bitBtn        = document.getElementById("btn-bit");
    const bitModal      = document.getElementById("bit-modal");
    const bitNumberEl   = document.getElementById("bit-modal-number");
    const bitCopyBtn    = document.getElementById("bit-copy-btn");
    const bitCloseBtn   = document.getElementById("bit-close-btn");

    function formatPhone(raw) {
      const digits = String(raw || "").replace(/\D/g, "");
      if (digits.length === 10) {
        return digits.slice(0, 3) + "-" + digits.slice(3, 6) + "-" + digits.slice(6);
      }
      return digits;
    }

    if (CONFIG.bitRequestUrl && CONFIG.bitRequestUrl.trim() !== "") {
      bitBtn.href = CONFIG.bitRequestUrl;
    } else {
      bitBtn.removeAttribute("target");
      bitBtn.href = "#";
      bitNumberEl.textContent = formatPhone(CONFIG.bitPhoneNumber);

      bitBtn.addEventListener("click", function (e) {
        e.preventDefault();
        openBitModal();
      });
    }

    function openBitModal() {
      bitModal.classList.add("is-open");
      bitModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      resetCopyBtn();
    }

    function closeBitModal() {
      bitModal.classList.remove("is-open");
      bitModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function resetCopyBtn() {
      bitCopyBtn.textContent = "העתק מספר";
      bitCopyBtn.classList.remove("copied");
    }

    async function copyPhone() {
      const digits = String(CONFIG.bitPhoneNumber || "").replace(/\D/g, "");
      try {
        await navigator.clipboard.writeText(digits);
      } catch (err) {
        const tmp = document.createElement("textarea");
        tmp.value = digits;
        tmp.style.position = "fixed";
        tmp.style.opacity = "0";
        document.body.appendChild(tmp);
        tmp.select();
        try { document.execCommand("copy"); } catch (_) {}
        document.body.removeChild(tmp);
      }
      bitCopyBtn.textContent = "הועתק";
      bitCopyBtn.classList.add("copied");
      setTimeout(resetCopyBtn, 2000);
    }

    bitCopyBtn.addEventListener("click", copyPhone);
    bitCloseBtn.addEventListener("click", closeBitModal);
    bitModal.addEventListener("click", function (e) {
      if (e.target === bitModal) closeBitModal();
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && bitModal.classList.contains("is-open")) {
        closeBitModal();
      }
    });
  </script>

</body>
</html>
